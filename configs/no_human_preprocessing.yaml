preprocessing:
  decoding_library: OpenCV (cv2.imread)
  default_color_space: BGR
  working_resolution:
  - 512
  - 512
  aspect_ratio_handling: resize_to_square
  crop_policy: none
  alpha_channel: ignored
  minimum_resolution:
  - 64
  - 64
  interpolation: INTER_LINEAR
  random_seed: 42
feature_extraction:
  feature_set: 30-core-traditional
  source_module: src/features/traditional_features.py
  color_space_conversions:
  - BGR -> RGB
  - BGR -> HSV
  - BGR -> Lab
  groups:
    colour:
    - num_dominant_colors
    - hue_mean
    - saturation_mean
    - saturation_std
    - value_mean
    - value_std
    - lightness_contrast
    - color_entropy
    - warm_color_ratio
    - hue_contrast
    - color_harmony
    edge_texture:
    - edge_density
    - edge_orientation_entropy
    - gray_mean
    - gray_std
    - gray_entropy
    - gradient_energy
    composition:
    - symmetry
    - rule_of_thirds
    - center_offset_x
    - center_offset_y
    - whitespace_ratio
    - fg_bg_ratio
    - diagonal_energy_ratio
    text_layout:
    - text_coverage
    - text_block_count
    - font_size_cv
    - has_text
    saliency:
    - saliency_mean
    - saliency_std
missing_value_policy:
  imputation: development_median
  finite_check: true
standardization:
  method: z_score
  stats_source: D-development (all metadata images; no human labels)
  clip_bounds:
  - -4
  - 4
rescaling:
  target_range:
  - 0
  - 100
  bounds_source: development-set 0.5th and 99.5th percentiles of raw scores
  final_clip:
  - 0
  - 100
determinism:
  multiprocessing: allowed but per-image order is unordered; results must be identical
    up to floating-point tolerance
  expected_tolerance: 1e-6
